<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <link crossorigin="anonymous" href="https://cdn.bootcss.com/twitter-bootstrap/3.3.7/css/bootstrap.min.css"
    rel="stylesheet">    <script src="https://cdn.bootcdn.net/ajax/libs/axios/0.21.1/axios.min.js"></script>
    <title>Document</title>
</head>

<body>
    <div class="container">
        <h2 class="page-header">基本使用</h2>
        <button class="btn btn-primary">发送GET请求</button>
        <button class="btn btn-warning">发送POST请求</button>
        <button class="btn btn-success">发送PUT请求</button>
        <button class="btn btn-danger">发送DELETE请求</button>
    </div>
    <script>
        //获取按钮 
        const btns = document.getElementsByTagName('button');

        btns[0].onclick = function () {
            axios({
                method: 'GET',
                url: 'http://localhost:3000/posts/1'
            }).then(response => {
                console.log(response);
            })
        }
        //添加一篇文章
        btns[1].onclick = function () {
            axios({
                method: 'POST',
                url: 'http://127.0.0.1:3000/posts',
                data: {
                    title: '今天星期二，晚上20：55',
                    author: 'jiajia'
                }
            })
        }

        //更新一篇文章
        btns[2].onclick = function () {
            axios({
                method: 'PUT',
                url: 'http:127.0.0.1:3000/posts/2',
                data: {
                    title: '现在是2021年，4，20 星期二晚上21：00，在学习的是axios',
                    author: 'liao'
                }
            })
        }

        //delete一篇文文章
        btns[3].onclick = function () {
            axios({
                method: 'delete',
                url: 'http:localhost:3000/posts/2',
            })
        }
    </script>
</body>

</html>
